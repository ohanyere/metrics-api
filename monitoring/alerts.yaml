apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: metrics-api-alerts
  labels:
    app.kubernetes.io/name: metrics-api
    release: prometheus
spec:
  groups:
    - name: metrics-api.availability
      rules:
        - alert: metrics-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="metrics-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="metrics-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Payments
          annotations:
            summary: metrics-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: metrics-apiUnavailable
          expr: up{job="metrics-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Payments
          annotations:
            summary: metrics-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
